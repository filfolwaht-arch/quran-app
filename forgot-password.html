<!DOCTYPE html>
<!--
  forgot-password.html
  ----------------------------------------------------------------------------
  Requests a password reset email. Always shows the same success message
  regardless of whether the address is registered, so the form can't be used
  to discover which emails have accounts (standard anti-enumeration practice
  -- see forgot-password.js).
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset password · Manara</title>

  <script>
    (function () {
      var theme = localStorage.getItem('manara_theme') || 'auto';
      var resolved = theme === 'auto'
        ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
        : theme;
      document.documentElement.setAttribute('data-theme', resolved);

      var lang = localStorage.getItem('manara_lang');
      if (lang && ['en', 'fr', 'ar'].includes(lang)) {
        document.documentElement.lang = lang;
        document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
      }
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cormorant+Garamond:wght@500;600;700&family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/main.css" />

  <script src="env.js"></script>
</head>
<body class="is-authing">
  <div class="auth-shell">
    <header class="site-header">
      <a href="index.html" class="brand"><span class="brand-mark">✦</span><span>Manara</span></a>
      <div class="header-controls">
        <div class="switcher" role="group" aria-label="Language">
          <button type="button" data-lang-switch="en">EN</button>
          <button type="button" data-lang-switch="fr">FR</button>
          <button type="button" data-lang-switch="ar">AR</button>
        </div>
        <div class="switcher" role="group" aria-label="Theme">
          <button type="button" data-theme-switch="light">☀</button>
          <button type="button" data-theme-switch="dark">☾</button>
          <button type="button" data-theme-switch="auto">A</button>
        </div>
      </div>
    </header>

    <main class="auth-main">
      <div class="card">
        <span class="card-eyebrow"></span>
        <h1 class="card-title display" data-i18n="forgotPassword.title">Reset your password</h1>
        <p class="card-subtitle" data-i18n="forgotPassword.subtitle">We'll email you a link to get back in</p>

        <div class="alert alert-success" id="success-alert" style="display:none" data-i18n="forgotPassword.successMessage"></div>

        <form id="forgot-form" novalidate>
          <div class="field" id="email-field">
            <label class="field-label" for="email" data-i18n="forgotPassword.email">Email</label>
            <input class="input" type="email" id="email" name="email" autocomplete="email" required
                   data-i18n-placeholder="login.emailPlaceholder" />
            <p class="field-error" data-i18n="validation.invalidEmail"></p>
          </div>

          <button type="submit" class="btn btn-primary" id="forgot-submit" data-i18n="forgotPassword.submit">Send reset link</button>
        </form>

        <div class="motif-divider" aria-hidden="true"></div>

        <p class="card-footer">
          <a href="login.html" data-i18n="forgotPassword.backToLogin">Back to sign in</a>
        </p>
      </div>
    </main>
  </div>

  <script type="module" src="js/forgot-password.js"></script>
</body>
</html>
