<!DOCTYPE html>
<!--
  reset-password.html
  ----------------------------------------------------------------------------
  Landing target for the link in the password-recovery email (set as
  redirectTo in forgot-password.js). Supabase appends recovery tokens to
  this URL; detectSessionInUrl (on by default in supabaseClient.js) reads
  them and fires a PASSWORD_RECOVERY auth event, which reset-password.js
  listens for before it will show the "new password" form. See that file
  for why three states exist here (verifying / form / invalid link).
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set new password · Manara</title>

  <script>
    (function () {
      var theme = localStorage.getItem('manara_theme') || 'auto';
      var resolved = theme === 'auto'
        ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
        : theme;
      document.documentElement.setAttribute('data-theme', resolved);

      var lang = localStorage.getItem('manara_lang');
      if (lang && ['en', 'fr', 'ar'].includes(lang)) {
        document.documentElement.lang = lang;
        document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
      }
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cormorant+Garamond:wght@500;600;700&family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/main.css" />

  <script src="env.js"></script>
</head>
<body class="is-authing">
  <div class="auth-shell">
    <header class="site-header">
      <a href="index.html" class="brand"><span class="brand-mark">✦</span><span>Manara</span></a>
      <div class="header-controls">
        <div class="switcher" role="group" aria-label="Language">
          <button type="button" data-lang-switch="en">EN</button>
          <button type="button" data-lang-switch="fr">FR</button>
          <button type="button" data-lang-switch="ar">AR</button>
        </div>
        <div class="switcher" role="group" aria-label="Theme">
          <button type="button" data-theme-switch="light">☀</button>
          <button type="button" data-theme-switch="dark">☾</button>
          <button type="button" data-theme-switch="auto">A</button>
        </div>
      </div>
    </header>

    <main class="auth-main">
      <div class="card">
        <!-- State 1: verifying the recovery link -->
        <div id="reset-verifying" class="text-center" style="padding-block:var(--space-5)">
          <svg class="spinner-star mx-auto" viewBox="0 0 24 24" width="28" height="28" aria-hidden="true">
            <polygon points="12,2 22,12 12,22 2,12" />
            <polygon points="12,2 22,12 12,22 2,12" transform="rotate(45 12 12)" />
          </svg>
        </div>

        <!-- State 2: the new-password form -->
        <div id="reset-form-wrapper" style="display:none">
          <span class="card-eyebrow"></span>
          <h1 class="card-title display" data-i18n="resetPassword.title">Choose a new password</h1>
          <p class="card-subtitle" data-i18n="resetPassword.subtitle">Make it something you haven't used before</p>

          <form id="reset-form" novalidate>
            <div class="field" id="password-field">
              <label class="field-label" for="new-password" data-i18n="resetPassword.newPassword">New password</label>
              <div class="password-field">
                <input class="input" type="password" id="new-password" name="password" autocomplete="new-password" required />
                <button type="button" class="password-toggle" aria-label="Show"></button>
              </div>
              <div class="strength-meter" id="strength-meter" data-score="0">
                <div class="strength-bars"><span></span><span></span><span></span><span></span></div>
                <span class="strength-label" id="strength-label"></span>
              </div>
              <p class="field-error" id="password-error"></p>
            </div>

            <div class="field" id="confirm-password-field">
              <label class="field-label" for="confirm-password" data-i18n="resetPassword.confirmPassword">Confirm new password</label>
              <div class="password-field">
                <input class="input" type="password" id="confirm-password" name="confirmPassword" autocomplete="new-password" required />
                <button type="button" class="password-toggle" aria-label="Show"></button>
              </div>
              <p class="field-error" data-i18n="validation.passwordsDoNotMatch"></p>
            </div>

            <button type="submit" class="btn btn-primary" id="reset-submit" data-i18n="resetPassword.submit">Update password</button>
          </form>
        </div>

        <!-- State 3: link invalid/expired -->
        <div id="reset-invalid" style="display:none">
          <span class="card-eyebrow"></span>
          <h1 class="card-title display" data-i18n="resetPassword.invalidLinkTitle">This link isn't valid</h1>
          <p class="card-subtitle" data-i18n="resetPassword.invalidLinkMessage">It may have expired or already been used.</p>
          <a class="btn btn-primary" href="forgot-password.html" data-i18n="resetPassword.requestNewLink">Request a new link</a>
        </div>

        <!-- State 4: success -->
        <div id="reset-success" class="text-center" style="display:none">
          <div class="verify-icon is-success" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="28" height="28"><path d="M5 12l5 5L20 7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <p class="card-subtitle" data-i18n="resetPassword.successMessage" style="margin-block-end:0"></p>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="js/reset-password.js"></script>
</body>
</html>
