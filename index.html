<!DOCTYPE html>
<!--
  index.html
  ----------------------------------------------------------------------------
  Entry point. Does nothing but decide where to send the visitor: signed-in
  users go to the dashboard (profile.html), everyone else goes to login.
  Kept deliberately minimal -- this page is never meant to be looked at for
  more than a moment.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manara</title>

  <!-- Set theme before first paint to avoid a light/dark flash -->
  <script>
    (function () {
      var theme = localStorage.getItem('manara_theme') || 'auto';
      var resolved = theme === 'auto'
        ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
        : theme;
      document.documentElement.setAttribute('data-theme', resolved);

      var lang = localStorage.getItem('manara_lang');
      if (lang && ['en', 'fr', 'ar'].includes(lang)) {
        document.documentElement.lang = lang;
        document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
      }
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cormorant+Garamond:wght@500;600;700&family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/main.css" />

  <script src="env.js"></script>
</head>
<body>
  <div class="full-page-loader">
    <svg class="spinner-star" viewBox="0 0 24 24" width="32" height="32" aria-hidden="true">
      <polygon points="12,2 22,12 12,22 2,12" />
      <polygon points="12,2 22,12 12,22 2,12" transform="rotate(45 12 12)" />
    </svg>
    <span data-i18n="common.loading">Loading…</span>
  </div>

  <script type="module">
    import { supabase } from './js/supabaseClient.js';
    import { ROUTES } from './js/constants.js';
    import { applyTranslations, getLang } from './js/i18n.js';

    applyTranslations(getLang());

    const {
      data: { session },
    } = await supabase.auth.getSession();

    window.location.replace(session ? ROUTES.DASHBOARD : ROUTES.LOGIN);
  </script>
</body>
</html>
